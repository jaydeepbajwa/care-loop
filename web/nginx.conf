server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Same-origin proxy to the API — no CORS in the demo
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
    }
    location /health { proxy_pass http://api:8000; }
    location /metrics { proxy_pass http://api:8000; }
}
