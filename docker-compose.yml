services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: careloop
      POSTGRES_PASSWORD: careloop
      POSTGRES_DB: careloop
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careloop"]
      interval: 2s
      timeout: 3s
      retries: 15
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: ./server
    environment:
      DATABASE_URL: postgresql+psycopg://careloop:careloop@db:5432/careloop
      # Optional: set in .env to enable LLM triage; rules classifier otherwise
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      TRIAGE_MODEL: ${TRIAGE_MODEL:-claude-opus-4-8}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  web:
    build: ./web
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  pgdata:
